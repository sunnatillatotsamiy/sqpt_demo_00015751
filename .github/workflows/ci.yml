name: "CI Pipeline"

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read

jobs:
  # ──────────────────────────────────────────────
  # JOB 1 ─ Install deps & run all tests
  # ──────────────────────────────────────────────
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt
            pyproject.toml

      # ── STAGE 1: Install Dependencies ──
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt
          playwright install chromium --with-deps

      # ── STAGE 2: Unit Tests ──
      - name: Run unit tests with coverage
        run: |
          pytest tests/unit \
            --cov=app \
            --cov-report=xml:coverage.xml \
            --cov-report=html:htmlcov \
            --junitxml=unit-results.xml

      # ── STAGE 3: API Integration Tests ──
      - name: Run API tests
        run: |
          pytest tests/api \
            --cov=app --cov-append \
            --cov-report=xml:coverage.xml \
            --junitxml=api-results.xml

      # ── STAGE 4: E2E Browser Tests ──
      - name: Run E2E tests
        run: |
          pytest tests/e2e -m e2e \
            --cov=app --cov-append \
            --cov-report=xml:coverage.xml \
            --junitxml=e2e-results.xml

      # ── STAGE 5: Upload Coverage & Test Reports ──
      - name: Upload coverage html
        uses: actions/upload-artifact@v6
        if: always()
        with:
          name: coverage-html
          path: htmlcov/
          if-no-files-found: error

      - name: Upload coverage xml
        uses: actions/upload-artifact@v6
        if: always()
        with:
          name: coverage-xml
          path: coverage.xml
          if-no-files-found: error

      - name: Upload test results
        uses: actions/upload-artifact@v6
        if: always()
        with:
          name: test-results
          path: |
            unit-results.xml
            api-results.xml
            e2e-results.xml
          if-no-files-found: error

  # ──────────────────────────────────────────────
  # JOB 2 ─ SonarQube / SonarCloud Quality Gate
  # ──────────────────────────────────────────────
  sonar:
    needs: test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Download coverage xml
        uses: actions/download-artifact@v8
        with:
          name: coverage-xml
          path: .

      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v7
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  # ──────────────────────────────────────────────
  # JOB 3 ─ Build & Publish Final Artifacts
  # ──────────────────────────────────────────────
  publish:
    needs: [test, sonar]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Build distribution package
        run: |
          python -m pip install --upgrade pip
          pip install build
          python -m build

      - name: Upload dist package
        uses: actions/upload-artifact@v6
        with:
          name: dist-package
          path: dist/
          if-no-files-found: error

      - name: Download coverage html
        uses: actions/download-artifact@v8
        with:
          name: coverage-html
          path: final-artifacts/htmlcov

      - name: Download coverage xml
        uses: actions/download-artifact@v8
        with:
          name: coverage-xml
          path: final-artifacts

      - name: Download test results
        uses: actions/download-artifact@v8
        with:
          name: test-results
          path: final-artifacts/test-results

      - name: Upload final artifacts bundle
        uses: actions/upload-artifact@v6
        with:
          name: final-artifacts
          path: final-artifacts/
          if-no-files-found: error
